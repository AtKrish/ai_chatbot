<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support Assistant</title>

    <!-- Styles -->
    <link rel="stylesheet" href="/static/styles.css?v=kb-links-2">

    <!-- Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Optional: Safe HTML Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

    <!-- App Logic -->
    <script src="/static/script.js?v=adaptive-chat-3" defer></script>
</head>
<body>

    <!-- Floating Chat Launcher -->
    <div id="chat-bubble">
        💬
    </div>

    <!-- Chat Window -->
    <div id="chat-window">

        <!-- Header -->
        <div id="chat-header">

            <div class="header-left">
                <div class="bot-avatar">🤖</div>

                <div class="assistant-info">
                    <div class="assistant-name">AI Support Assistant</div>
                    <div class="assistant-status">
                        <span class="status-dot"></span>
                        Online
                    </div>
                </div>
            </div>

            <div class="header-actions">
                <button id="fullscreen-btn" title="Fullscreen">
                    ⛶
                </button>

                <button id="close-btn" title="Close">
                    ✕
                </button>
            </div>

        </div>

        <!-- Messages -->
        <div id="chat-body"></div>

        <!-- Input Area -->
        <div id="chat-input">

            <input
                id="message"
                type="text"
                placeholder="Describe your issue..."
                autocomplete="off"
            >

            <button id="send-btn" title="Send">
                ➤
            </button>

            <button
                id="stop-btn"
                title="Stop Processing"
                style="display:none;"
            >
                ⏹
            </button>

        </div>

    </div>

</body>
</html>
