<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        /* Chat Bubble */
        #chat-bubble {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2F80ED;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
        }

        /* Chat Window */
        #chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: white;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        /* Header */
        #chat-header {
            background: #2F80ED;
            color: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        #chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        #chat-input {
            display: flex;
            border-top: 1px solid #ccc;
        }

        #chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        #chat-input button {
            background: #2F80ED;
            color: white;
            border: none;
            padding: 10px;
        }

        /* Full Screen Mode */
        .fullscreen {
            width: 100% !important;
            height: 100% !important;
            bottom: 0 !important;
            right: 0 !important;
            border-radius: 0 !important;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #chat-window {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

<div id="chat-bubble" onclick="toggleChat()">💬</div>

<div id="chat-window">
    <div id="chat-header">
        <span>AI Assistant 🤖</span>
        <div>
            <button onclick="toggleFull()">⬜</button>
            <button onclick="toggleChat()">✖</button>
        </div>
    </div>

    <div id="chat-body"></div>

    <div id="chat-input">
        <input id="message" placeholder="Type your issue..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function toggleChat() {
        const chat = document.getElementById("chat-window");
        chat.style.display = chat.style.display === "flex" ? "none" : "flex";
    }

    function toggleFull() {
        document.getElementById("chat-window").classList.toggle("fullscreen");
    }

    function sendMessage() {
        const input = document.getElementById("message");
        const text = input.value;
        if (!text) return;

        const chatBody = document.getElementById("chat-body");

        chatBody.innerHTML += `<div><b>You:</b> ${text}</div>`;

        // 🔥 Replace this with your backend API call
        setTimeout(() => {
            chatBody.innerHTML += `<div><b>AI:</b> Processing your request...</div>`;
            chatBody.scrollTop = chatBody.scrollHeight;
        }, 500);

        input.value = "";
    }
</script>

</body>
</html>
